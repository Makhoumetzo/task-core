spring:
  application:
    name: task-core

  # ── Base de données MySQL ───────────────────────────────────────────────────
  # Les ${VARIABLE:valeur_par_defaut} permettent de :
  #   - En local : utiliser les valeurs par défaut (localhost, taskapp, etc.)
  #   - Dans Docker/K8s : injecter les vraies valeurs via variables d'environnement
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:taskmanager_db}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:taskapp}
    password: ${MYSQL_PASSWORD:taskpass123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ── JPA / Hibernate ─────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

# ── Serveur ────────────────────────────────────────────────────────────────────
server:
  port: 8085

# ── Actuator / Prometheus ──────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: task-core

# ── Logging SQL ────────────────────────────────────────────────────────────────
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

