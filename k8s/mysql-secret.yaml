# ══════════════════════════════════════════════════════════════════════════════
# mysql-secret.yaml — Stockage sécurisé des identifiants MySQL
# ══════════════════════════════════════════════════════════════════════════════
# Les Secrets Kubernetes permettent de stocker des données sensibles
# (mots de passe, clés API, etc.) séparément du code.
# Les valeurs sont encodées en base64 (commande : echo -n "valeur" | base64)
# ══════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  labels:
    app: task-core
    component: database
type: Opaque
data:
  # echo -n "rootpass123" | base64
  mysql-root-password: cm9vdHBhc3MxMjM=
  # echo -n "taskapp" | base64
  mysql-user: dGFza2FwcA==
  # echo -n "taskpass123" | base64
  mysql-password: dGFza3Bhc3MxMjM=
  # echo -n "taskmanager_db" | base64
  mysql-database: dGFza21hbmFnZXJfZGI=
