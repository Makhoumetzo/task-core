# ══════════════════════════════════════════════════════════════════════════════
# app-deployment.yaml — Déploiement de l'application Spring Boot
# ══════════════════════════════════════════════════════════════════════════════
# Ce Deployment :
#   1. Tire l'image Docker depuis Docker Hub
#   2. Injecte la config (ConfigMap) et les secrets (Secret)
#   3. Configure des health checks pour que K8s sache si l'app est prête
#
# IMPORTANT : Remplacez <DOCKERHUB_USERNAME> par votre nom d'utilisateur
# Docker Hub avant de déployer !
# ══════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-deployment
  labels:
    app: task-core
    component: backend
spec:
  # 2 réplicas = 2 instances de l'app pour la haute disponibilité
  replicas: 2
  selector:
    matchLabels:
      component: backend
  template:
    metadata:
      labels:
        app: task-core
        component: backend
    spec:
      containers:
        - name: task-core
          # Image Docker Hub de l'application
          image: makhoumetzo/task-core:0.4.0
          ports:
            - containerPort: 8085
          # Injecter les variables du ConfigMap (MYSQL_HOST, MYSQL_PORT, etc.)
          envFrom:
            - configMapRef:
                name: app-configmap
          # Injecter les secrets MySQL comme variables d'environnement
          env:
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-password
          # ── Health Checks ──────────────────────────────────────────────
          # readinessProbe : est-ce que l'app est PRÊTE à recevoir du trafic ?
          # K8s n'envoie pas de trafic tant que cette sonde échoue.
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            # Attendre 30s avant le premier check (le temps que Spring Boot démarre)
            initialDelaySeconds: 30
            # Vérifier toutes les 10 secondes
            periodSeconds: 10
          # livenessProbe : est-ce que l'app est encore VIVANTE ?
          # Si cette sonde échoue 3 fois, K8s redémarre le Pod.
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            initialDelaySeconds: 45
            periodSeconds: 15
          # Ressources CPU/mémoire allouées
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
