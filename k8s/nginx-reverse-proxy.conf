server {
    listen 8088 default_server;
    listen [::]:8088 default_server;
    server_name _;

    location /l3gl/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_set_header Host task.local;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
