# ══════════════════════════════════════════════════════════════════════════════
# app-service.yaml — Service pour exposer l'application dans le cluster
# ══════════════════════════════════════════════════════════════════════════════
# Le Service fait le lien entre l'Ingress et les Pods de l'application.
# Il répartit aussi le trafic entre les 2 réplicas (load balancing).
#
# Flux : Client → Ingress → Service (port 8085) → Pod 1 ou Pod 2
# ══════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: app-service
  labels:
    app: task-core
    component: backend
spec:
  # ClusterIP = accessible uniquement dans le cluster
  # L'Ingress se charge d'exposer le Service à l'extérieur
  type: ClusterIP
  ports:
    # Port du Service (celui que l'Ingress utilise)
    - port: 8085
      # Port du conteneur (celui de Spring Boot)
      targetPort: 8085
      protocol: TCP
  selector:
    # Route le trafic vers les Pods ayant le label "component: backend"
    component: backend
