# ══════════════════════════════════════════════════════════════════════════════
# ingress.yaml — Point d'entrée HTTP avec reverse proxy Nginx
# ══════════════════════════════════════════════════════════════════════════════
# L'Ingress est le "portail" du cluster : il reçoit les requêtes HTTP
# de l'extérieur et les redirige vers le bon Service interne.
#
# Ici, toute requête vers http://task.local/* est routée vers
# le Service "app-service" sur le port 8085.
#
# Prérequis : activer l'addon Ingress sur Minikube :
#   minikube addons enable ingress
#
# Puis ajouter dans C:\Windows\System32\drivers\etc\hosts :
#   <MINIKUBE_IP> task.local
# ══════════════════════════════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: task-ingress
  labels:
    app: task-core
  annotations:
    # Utiliser le contrôleur Ingress Nginx (installé par l'addon Minikube)
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  # Utiliser la classe Ingress Nginx
  ingressClassName: nginx
  rules:
    # Règle : les requêtes vers "task.local" sont routées vers l'app
    - host: task.local
      http:
        paths:
          - path: /
            # Prefix = toutes les URLs qui commencent par "/"
            pathType: Prefix
            backend:
              service:
                # Nom du Service de l'application
                name: app-service
                port:
                  # Port du Service
                  number: 8085
